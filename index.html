<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiritual AI Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali&family=Noto+Sans+Devanagari&family=Noto+Sans+Gurmukhi&family=Noto+Sans+Kannada&family=Noto+Sans+Malayalam&family=Noto+Sans+Oriya&family=Noto+Sans+Tamil&family=Noto+Sans+Telugu&family=Noto+Sans+Arabic&family=Noto+Sans+Ol+Chiki&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Username section in profile modal ── */
        .username-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
            margin-top: 4px;
        }
        .profile-modal-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #333;
            margin: 0;
        }
        .change-username-btn {
            background: none;
            border: 1.5px solid #c8960c;
            color: #c8960c;
            border-radius: 20px;
            padding: 5px 16px;
            font-size: 0.82rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background 0.18s, color 0.18s;
        }
        .change-username-btn:hover {
            background: #c8960c;
            color: #fff;
        }
        .username-edit-box {
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .username-input {
            width: 90%;
            padding: 8px 12px;
            border: 1.5px solid #c8960c;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            text-align: center;
            background: #fffdf5;
        }
        .username-edit-actions {
            display: flex;
            gap: 10px;
        }
        .save-username-btn {
            background: #c8960c;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 20px;
            font-size: 0.88rem;
            cursor: pointer;
            transition: background 0.18s;
        }
        .save-username-btn:hover { background: #a87a08; }
        .cancel-username-btn {
            background: #eee;
            color: #555;
            border: none;
            border-radius: 8px;
            padding: 6px 16px;
            font-size: 0.88rem;
            cursor: pointer;
        }
        .cancel-username-btn:hover { background: #ddd; }
    </style>
</head>

<body>

    <!-- =========================================
         LOGIN SCREEN
    ========================================= -->
    <div id="login-screen" class="login-screen">
        <div class="login-wrapper">
            <div class="login-logo-box">
                <img src="logo.png" alt="Logo" class="login-logo">
            </div>
            <h1 class="login-title">JAY SHREE RAM</h1>
            <div class="login-buttons">
                <button id="google-login-btn" class="login-btn google-btn">
                    <span class="icon google-icon">G</span>
                    <span>Continue with Google</span>
                </button>
                <p class="or-text">OR</p>
                <button id="facebook-login-btn" class="login-btn facebook-btn">
                    <span class="icon facebook-icon">f</span>
                    <span>Continue with Facebook</span>
                </button>
            </div>
            <p id="login-error" class="login-error"></p>
        </div>
    </div>

    <!-- =========================================
         SIDEBAR
    ========================================= -->
    <aside id="sidebar" class="sidebar">

        <!-- Toggle / Menu icon -->
        <button id="sidebar-toggle" class="sidebar-btn" type="button" title="Open Slider">
            <span class="sidebar-icon">☰</span>
            <span class="sidebar-label">Open Slider</span>
        </button>

        <!-- New Chat -->
        <button id="new-chat-btn" class="sidebar-btn" type="button" title="New Chat">
            <span class="sidebar-icon">＋</span>
            <span class="sidebar-label">New Chat</span>
        </button>

        <!-- Buy Book -->
        <button id="buy-book-btn" class="sidebar-btn" type="button" title="Buy Book">
            <img src="book-icon.png" alt="Buy Book" class="sidebar-book-icon">
            <span class="sidebar-label">Buy Book</span>
        </button>

        <!-- Books -->
        <button id="books-btn" class="sidebar-btn" type="button" title="Books">
            <span class="sidebar-icon">📚</span>
            <span class="sidebar-label">Books</span>
        </button>

        <!-- Divider -->
        <hr class="sidebar-divider">

        <!-- Recent Chat History -->
        <div id="sidebar-history" class="sidebar-history">
            <div class="history-heading">Recent</div>
            <div id="history-list" class="history-list"></div>
        </div>

        <!-- Divider before user -->
        <hr class="sidebar-divider">

        <!-- User Profile Section at Bottom -->
        <div class="sidebar-user">
            <button id="user-menu-btn" class="user-menu-btn" type="button" aria-label="Open user menu">
                <span id="sidebar-user-initial">U</span>
                <span id="sidebar-user-name" class="sidebar-label">User</span>
            </button>

            <!-- User Popup Menu -->
            <div id="user-menu-panel" class="user-menu-panel">

                <!-- Email (not clickable) -->
                <p id="sidebar-user-email" class="sidebar-user-email">user@email.com</p>

                <!-- Upgrade Plan -->
                <button id="upgrade-plan-btn" class="user-menu-option" type="button">
                    <span>⭐</span>
                    <span>Upgrade Plan</span>
                </button>

                <!-- Profile -->
                <button id="profile-btn" class="user-menu-option" type="button">
                    <span>👤</span>
                    <span>Profile</span>
                </button>

                <!-- Language Selector -->
                <div class="user-language-box">
                    <label for="language-select">🌐 Language</label>
                    <div id="sidebar-language-holder"></div>
                </div>

                <!-- Logout -->
                <button id="logout-btn" class="user-menu-option logout-option" type="button">
                    <span>🚪</span>
                    <span>Logout</span>
                </button>

            </div>
        </div>

    </aside>

    <!-- =========================================
         MAIN CONTENT
    ========================================= -->
    <div id="main-content" class="auth-hidden">

        <!-- Header (hidden via CSS, kept for i18n hooks) -->
        <header>
            <div class="header-left">
                <div class="logo-box">
                    <img src="logo.png" alt="Logo" class="main-logo">
                </div>
            </div>
            <div class="center-title">
                <h2>JAY SHREE RAM</h2>
            </div>
            <div class="header-right">
                <div class="header-right-column">
                    <img src="hanuman_ram_sita_pranam.jpg" alt="Hanuman Ram Sita Pranam"
                        class="header-img" data-i18n-alt="headerImageAlt">
                    <select id="language-select" class="lang-dropdown"
                        data-i18n-aria="selectLanguageAria" aria-label="Select language">
                        <option value="en">English</option>
                        <option value="gu">ગુજરાતી</option>
                        <option value="hi">हिन्दी</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-container">
            <div class="chat-box" id="chat-box">
                <div class="message ai-message">
                    <p id="welcome-msg" lang="en" dir="ltr" translate="no"
                        data-i18n="welcome" data-i18n-vars="name"></p>
                </div>
            </div>

            <!-- Fixed Bottom Input -->
            <div class="input-area">
                <input type="text" id="user-input"
                    data-i18n-placeholder="inputPlaceholder"
                    placeholder="Type your question here...">
                <div class="buttons-grid">
                    <button id="mic-btn"           class="action-btn"             data-i18n="micModeOff">🎤 Mode: Off</button>
                    <button id="speak-btn"          class="action-btn"             data-i18n="listen">🔊 Listen</button>
                    <button id="send-story-btn"     class="action-btn story-btn"      data-i18n="storyBtn">Story 📜</button>
                    <button id="send-suggestion-btn" class="action-btn suggestion-btn" data-i18n="suggestionBtn">Suggestion 💡</button>
                </div>
            </div>
        </main>

    </div>

    <!-- =========================================
         PROFILE MODAL
    ========================================= -->
    <div id="profile-modal" class="profile-modal">
        <div class="profile-card">

            <!-- Close Button -->
            <button id="profile-close-btn" class="profile-close-btn" type="button">×</button>

            <!-- Avatar with Camera Upload -->
            <div class="profile-avatar-wrap">
                <div id="profile-avatar" class="profile-avatar">U</div>
                <label for="profile-photo-input" class="camera-btn" title="Change photo">📷</label>
                <input type="file" id="profile-photo-input" accept="image/*" hidden>
            </div>

            <!-- Email -->
            <p id="profile-modal-email" class="profile-modal-email">user@email.com</p>

            <!-- Editable Username -->
            <div id="username-section" class="username-section">
                <p id="profile-modal-name" class="profile-modal-name">User</p>
                <button id="change-username-btn" class="change-username-btn" type="button">✏️ Change Username</button>
                <div id="username-edit-box" class="username-edit-box" style="display:none;">
                    <input type="text" id="username-input" class="username-input"
                        placeholder="Enter new username" maxlength="40">
                    <div class="username-edit-actions">
                        <button id="save-username-btn"   class="save-username-btn"   type="button">Save</button>
                        <button id="cancel-username-btn" class="cancel-username-btn" type="button">Cancel</button>
                    </div>
                </div>
            </div>

            <!-- Language Section -->
            <div class="profile-language-box">
                <label>🌐 Select Language</label>
                <div id="profile-language-holder"></div>
            </div>

        </div>
    </div>

    <!-- =========================================
         FIREBASE & SCRIPTS
    ========================================= -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="auth.js"></script>
    <script src="i18n.js"></script>
    <script src="script.js"></script>

    <script>
    // ── Change Username Logic ────────────────────────────────
    window.addEventListener("load", function () {
        const changeBtn     = document.getElementById("change-username-btn");
        const editBox       = document.getElementById("username-edit-box");
        const usernameInput = document.getElementById("username-input");
        const saveBtn       = document.getElementById("save-username-btn");
        const cancelBtn     = document.getElementById("cancel-username-btn");
        const nameDisplay   = document.getElementById("profile-modal-name");
        const sidebarName   = document.getElementById("sidebar-user-name");

        if (!changeBtn || !editBox) return;

        // Load saved username
        const saved = localStorage.getItem("customUsername");
        if (saved) {
            if (nameDisplay) nameDisplay.textContent = saved;
            if (sidebarName) sidebarName.textContent = saved;
        }

        changeBtn.addEventListener("click", function () {
            editBox.style.display = "flex";
            if (usernameInput) {
                usernameInput.value = nameDisplay ? nameDisplay.textContent : "";
                usernameInput.focus();
            }
            changeBtn.style.display = "none";
        });

        if (saveBtn) saveBtn.addEventListener("click", function () {
            const newName = usernameInput ? usernameInput.value.trim() : "";
            if (!newName) return;
            localStorage.setItem("customUsername", newName);
            if (nameDisplay) nameDisplay.textContent = newName;
            if (sidebarName) sidebarName.textContent = newName;
            editBox.style.display = "none";
            changeBtn.style.display = "inline-flex";
        });

        if (cancelBtn) cancelBtn.addEventListener("click", function () {
            editBox.style.display = "none";
            changeBtn.style.display = "inline-flex";
        });

        if (usernameInput) usernameInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter")  saveBtn  && saveBtn.click();
            if (e.key === "Escape") cancelBtn && cancelBtn.click();
        });
    });

    // ── User Menu Toggle ─────────────────────────────────────
    window.addEventListener("load", function () {
        const btn   = document.getElementById("user-menu-btn");
        const panel = document.getElementById("user-menu-panel");

        if (!btn || !panel) {
            console.error("USER MENU ELEMENT MISSING");
            return;
        }

        btn.onclick = function (e) {
            e.preventDefault();
            e.stopPropagation();
            panel.classList.toggle("user-menu-open");
        };

        document.addEventListener("click", function () {
            panel.classList.remove("user-menu-open");
        });

        panel.onclick = function (e) {
            e.stopPropagation();
        };
    });
    </script>

</body>
</html>
