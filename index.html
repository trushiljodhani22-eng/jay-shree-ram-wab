<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- This line is required to make the website look perfect on mobile screens -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiritual AI Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali&family=Noto+Sans+Devanagari&family=Noto+Sans+Gurmukhi&family=Noto+Sans+Kannada&family=Noto+Sans+Malayalam&family=Noto+Sans+Oriya&family=Noto+Sans+Tamil&family=Noto+Sans+Telugu&family=Noto+Sans+Arabic&family=Noto+Sans+Ol+Chiki&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Username section in profile modal ── */
        .username-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
            margin-top: 4px;
        }
        .profile-modal-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #333;
            margin: 0;
        }
        .change-username-btn {
            background: none;
            border: 1.5px solid #c8960c;
            color: #c8960c;
            border-radius: 20px;
            padding: 5px 16px;
            font-size: 0.82rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background 0.18s, color 0.18s;
        }
        .change-username-btn:hover {
            background: #c8960c;
            color: #fff;
        }
        .username-edit-box {
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .username-input {
            width: 90%;
            padding: 8px 12px;
            border: 1.5px solid #c8960c;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            text-align: center;
            background: #fffdf5;
        }
        .username-edit-actions {
            display: flex;
            gap: 10px;
        }
        .save-username-btn {
            background: #c8960c;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 20px;
            font-size: 0.88rem;
            cursor: pointer;
            transition: background 0.18s;
        }
        .save-username-btn:hover { background: #a87a08; }
        .cancel-username-btn {
            background: #eee;
            color: #555;
            border: none;
            border-radius: 8px;
            padding: 6px 16px;
            font-size: 0.88rem;
            cursor: pointer;
        }
        .cancel-username-btn:hover { background: #ddd; }

        /* ═══════════════════════════════════════════════════════
           [NEW] Translation Modal Styles
           (copied & adapted from File 2 — no existing styles changed)
           ═══════════════════════════════════════════════════════ */
        .translate-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .translate-modal-overlay.open {
            display: flex;
        }
        .translate-modal-card {
            background: #2a1500;
            border: 1px solid #c8960c44;
            border-radius: 16px;
            padding: 28px 24px 22px;
            width: 95%;
            max-width: 520px;
            position: relative;
            box-shadow: 0 8px 40px #0009;
            font-family: 'Georgia', serif;
            color: #f5e6c8;
        }
        .translate-modal-title {
            text-align: center;
            font-size: 1.25rem;
            color: #f5c842;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .translate-modal-subtitle {
            text-align: center;
            font-size: 0.78rem;
            color: #c8960c88;
            margin-bottom: 18px;
        }
        .translate-modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #f5c842;
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
            padding: 0;
        }
        .tm-label {
            font-size: 0.75rem;
            color: #c8960c;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 7px;
        }
        .tm-presets {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .tm-preset-btn {
            background: #1a0a00;
            border: 1px solid #c8960c44;
            color: #c8960c;
            padding: 4px 11px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .tm-preset-btn:hover {
            background: #c8960c22;
            border-color: #c8960c;
            color: #f5c842;
        }
        .tm-textarea {
            width: 100%;
            background: #120800;
            border: 1px solid #c8960c55;
            border-radius: 8px;
            color: #f5e6c8;
            font-size: 0.97rem;
            padding: 11px;
            resize: vertical;
            min-height: 75px;
            font-family: inherit;
            outline: none;
            margin-bottom: 13px;
        }
        .tm-textarea:focus { border-color: #f5c842; }
        .tm-lang-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .tm-btn-gu {
            background: #c8960c;
            color: #1a0a00;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            padding: 9px 20px;
            font-size: 0.88rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .tm-btn-gu:hover { background: #f5c842; }
        .tm-btn-hi {
            background: #e05a00;
            color: #fff;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            padding: 9px 20px;
            font-size: 0.88rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .tm-btn-hi:hover { background: #ff7722; }
        .tm-btn-gu:disabled,
        .tm-btn-hi:disabled { opacity: 0.5; cursor: not-allowed; }
        .tm-result-box {
            margin-top: 12px;
            background: #0d0500;
            border-radius: 8px;
            border-left: 3px solid #c8960c;
            padding: 13px 15px;
            min-height: 46px;
            font-size: 1rem;
            line-height: 1.6;
            display: none;
        }
        .tm-result-box.show { display: block; }
        .tm-result-lang {
            font-size: 0.7rem;
            color: #c8960c;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .tm-result-text { color: #f5e6c8; }
        .tm-spinner {
            display: inline-block;
            width: 15px;
            height: 15px;
            border: 2px solid #c8960c44;
            border-top-color: #f5c842;
            border-radius: 50%;
            animation: tmSpin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 7px;
        }
        @keyframes tmSpin { to { transform: rotate(360deg); } }
        .tm-error { color: #ff6b6b; font-size: 0.85rem; }
        .tm-accuracy-note {
            font-size: 0.72rem;
            color: #c8960c77;
            margin-top: 8px;
            font-style: italic;
        }
    </style>
</head>

    <script>
    // ── Change Username Logic ────────────────────────────────
    // [PRESERVED — untouched from File 1]
    window.addEventListener("load", function () {
        const changeBtn     = document.getElementById("change-username-btn");
        const editBox       = document.getElementById("username-edit-box");
        const usernameInput = document.getElementById("username-input");
        const saveBtn       = document.getElementById("save-username-btn");
        const cancelBtn     = document.getElementById("cancel-username-btn");
        const nameDisplay   = document.getElementById("profile-modal-name");
        const sidebarName   = document.getElementById("sidebar-user-name");

        if (!changeBtn || !editBox) return;

        // Load saved username
        const saved = localStorage.getItem("customUsername");
        if (saved) {
            if (nameDisplay) nameDisplay.textContent = saved;
            if (sidebarName) sidebarName.textContent = saved;
        }

        changeBtn.addEventListener("click", function () {
            editBox.style.display = "flex";
            if (usernameInput) {
                usernameInput.value = nameDisplay ? nameDisplay.textContent : "";
                usernameInput.focus();
            }
            changeBtn.style.display = "none";
        });

        if (saveBtn) saveBtn.addEventListener("click", function () {
            const newName = usernameInput ? usernameInput.value.trim() : "";
            if (!newName) return;
            localStorage.setItem("customUsername", newName);
            if (nameDisplay) nameDisplay.textContent = newName;
            if (sidebarName) sidebarName.textContent = newName;
            editBox.style.display = "none";
            changeBtn.style.display = "inline-flex";
        });

        if (cancelBtn) cancelBtn.addEventListener("click", function () {
            editBox.style.display = "none";
            changeBtn.style.display = "inline-flex";
        });

        if (usernameInput) usernameInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter")  saveBtn  && saveBtn.click();
            if (e.key === "Escape") cancelBtn && cancelBtn.click();
        });
    });

    // ── User Menu Toggle ─────────────────────────────────────
    // [PRESERVED — untouched from File 1]
    window.addEventListener("load", function () {
        const btn   = document.getElementById("user-menu-btn");
        const panel = document.getElementById("user-menu-panel");

        if (!btn || !panel) {
            console.error("USER MENU ELEMENT MISSING");
            return;
        }

        btn.onclick = function (e) {
            e.preventDefault();
            e.stopPropagation();
            panel.classList.toggle("user-menu-open");
        };

        document.addEventListener("click", function () {
            panel.classList.remove("user-menu-open");
        });

        panel.onclick = function (e) {
            e.stopPropagation();
        };
    });

    // ── [NEW] Translation Modal Logic ────────────────────────
    // (Full logic from File 2 — adapted for modal, no existing code changed)
    window.addEventListener("load", function () {

        const translateBtn    = document.getElementById("translate-btn");
        const overlay         = document.getElementById("translate-modal-overlay");
        const closeBtn        = document.getElementById("translate-modal-close");

        // Open modal
        if (translateBtn && overlay) {
            translateBtn.addEventListener("click", function () {
                overlay.classList.add("open");
            });
        }

        // Close modal — close button
        if (closeBtn && overlay) {
            closeBtn.addEventListener("click", function () {
                overlay.classList.remove("open");
            });
        }

        // Close modal — click outside card
        if (overlay) {
            overlay.addEventListener("click", function (e) {
                if (e.target === overlay) {
                    overlay.classList.remove("open");
                }
            });
        }

        // Close modal — Escape key
        document.addEventListener("keydown", function (e) {
            if (e.key === "Escape" && overlay) {
                overlay.classList.remove("open");
            }
        });

        // Preset buttons (from File 2 — prefixed with tm- to avoid ID conflicts)
        document.querySelectorAll(".tm-preset-btn").forEach(function (btn) {
            btn.addEventListener("click", function () {
                var input = document.getElementById("tm-input-text");
                var resultBox = document.getElementById("tm-result-box");
                var note = document.getElementById("tm-accuracy-note");
                if (input) input.value = btn.getAttribute("data-preset");
                if (resultBox) resultBox.classList.remove("show");
                if (note) note.textContent = "";
            });
        });

        // Translate buttons
        var btnGu = document.getElementById("tm-btn-gu");
        var btnHi = document.getElementById("tm-btn-hi");
        if (btnGu) btnGu.addEventListener("click", function () { doTranslate("gu"); });
        if (btnHi) btnHi.addEventListener("click", function () { doTranslate("hi"); });

        // Core translate function (from File 2 — all logic preserved exactly)
        async function doTranslate(targetLang) {
            var text = document.getElementById("tm-input-text");
            if (!text || !text.value.trim()) return;
            text = text.value.trim();

            var btnGuEl    = document.getElementById("tm-btn-gu");
            var btnHiEl    = document.getElementById("tm-btn-hi");
            var resultBox  = document.getElementById("tm-result-box");
            var resultLang = document.getElementById("tm-result-lang");
            var resultText = document.getElementById("tm-result-text");
            var note       = document.getElementById("tm-accuracy-note");

            if (btnGuEl) btnGuEl.disabled = true;
            if (btnHiEl) btnHiEl.disabled = true;
            if (resultBox) resultBox.classList.add("show");
            if (resultLang) resultLang.textContent = targetLang === "gu" ? "ગુજરાતી" : "हिन्दी";
            if (resultText) resultText.innerHTML = '<span class="tm-spinner"></span> Translating...';
            if (note) note.textContent = "";

            var langPair = targetLang === "gu" ? "en|gu" : "en|hi";
            var url = "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(text) + "&langpair=" + langPair;

            try {
                var res  = await fetch(url);
                var data = await res.json();

                if (data.responseStatus === 200) {
                    var translated = data.responseData.translatedText;
                    var match      = data.responseData.match;
                    if (resultText) resultText.textContent = translated;

                    if (match !== undefined) {
                        var pct     = Math.round(match * 100);
                        var verdict = pct >= 80
                            ? "✅ Saru chhe"
                            : pct >= 60
                            ? "⚠️ Thodu check karo"
                            : "❌ Manual check karvo padse";
                        if (note) note.textContent = "Accuracy score: " + pct + "% — " + verdict;
                    }
                } else {
                    if (resultText) resultText.innerHTML =
                        '<span class="tm-error">Error: ' + (data.responseDetails || "Translation failed") + "</span>";
                }
            } catch (err) {
                if (resultText) resultText.innerHTML =
                    '<span class="tm-error">Network error. Internet check karo.</span>';
            }

            if (btnGuEl) btnGuEl.disabled = false;
            if (btnHiEl) btnHiEl.disabled = false;
        }

    });
    </script>

    <!-- =========================================
         MOBILE LAYOUT JAVASCRIPT
    ========================================= -->
    <script>
    (function () {

        var hamburgerBtn    = document.getElementById("mobile-hamburger-btn");
        var drawerOverlay   = document.getElementById("mobile-drawer-overlay");
        var drawer          = document.getElementById("mobile-drawer");
        var drawerCloseBtn  = document.getElementById("mobile-drawer-close");
        var avatarBtn       = document.getElementById("mobile-avatar-btn");
        var mobileTopAvatar = document.getElementById("mobile-top-avatar");

        // Drawer buttons
        var mobNewChat      = document.getElementById("mob-new-chat-btn");
        var mobBuyBook      = document.getElementById("mob-buy-book-btn");
        var mobBooks        = document.getElementById("mob-books-btn");
        var mobTranslate    = document.getElementById("mob-translate-btn");
        var mobUserMenu     = document.getElementById("mob-user-menu-btn");

        // ── Drawer open / close ───────────────────────────────
        function openDrawer() {
            if (drawer) drawer.classList.add("drawer-open");
            if (drawerOverlay) drawerOverlay.classList.add("drawer-open");
            document.body.style.overflow = "hidden";
        }
        function closeDrawer() {
            if (drawer) drawer.classList.remove("drawer-open");
            if (drawerOverlay) drawerOverlay.classList.remove("drawer-open");
            document.body.style.overflow = "";
        }

        if (hamburgerBtn)   hamburgerBtn.addEventListener("click", openDrawer);
        if (drawerCloseBtn) drawerCloseBtn.addEventListener("click", closeDrawer);
        if (drawerOverlay)  drawerOverlay.addEventListener("click", closeDrawer);

        // ── New Chat ──────────────────────────────────────────
        function triggerNewChat() {
            var mainBtn = document.getElementById("new-chat-btn");
            if (mainBtn) mainBtn.click();
            closeDrawer();
        }
        if (mobNewChat) mobNewChat.addEventListener("click", triggerNewChat);

        // ── Drawer buttons ────────────────────────────────────
        if (mobBuyBook) mobBuyBook.addEventListener("click", function () {
            var btn = document.getElementById("buy-book-btn");
            if (btn) btn.click();
            closeDrawer();
        });
        if (mobBooks) mobBooks.addEventListener("click", function () {
            var btn = document.getElementById("books-btn");
            if (btn) btn.click();
            closeDrawer();
        });
        function openTranslate() {
            var btn = document.getElementById("translate-btn");
            if (btn) btn.click();
            closeDrawer();
        }
        if (mobTranslate) mobTranslate.addEventListener("click", openTranslate);

        // ── Drawer user → open main user menu panel ───────────
        if (mobUserMenu) mobUserMenu.addEventListener("click", function () {
            closeDrawer();
            var userMenuBtn = document.getElementById("user-menu-btn");
            if (userMenuBtn) userMenuBtn.click();
        });

        // ── Top-bar Avatar → open main user menu panel ────────
        if (avatarBtn) {
            avatarBtn.addEventListener("click", function (e) {
                e.stopPropagation();
                var panel = document.getElementById("user-menu-panel");
                if (panel) panel.classList.toggle("user-menu-open");
            });
        }

        // ── Sync top avatar with Firebase user ────────────────
        window.addEventListener("spiritual-auth-success", function () {
            var savedPhoto = localStorage.getItem("profilePhoto");
            var sidebarInitial = document.getElementById("sidebar-user-initial");
            var sidebarName    = document.getElementById("sidebar-user-name");

            // Mobile drawer avatar
            var mobAvatar = document.getElementById("mob-user-avatar");
            var mobName   = document.getElementById("mob-user-name");
            if (mobName && sidebarName) mobName.textContent = sidebarName.textContent || "User";

            if (savedPhoto) {
                var img = '<img src="' + savedPhoto + '" alt="User" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
                if (mobAvatar) mobAvatar.innerHTML = img;
                if (mobileTopAvatar) mobileTopAvatar.innerHTML = img;
            } else {
                var initial = (sidebarInitial ? sidebarInitial.textContent : "") || "U";
                if (mobAvatar) mobAvatar.textContent = initial;
                if (mobileTopAvatar) mobileTopAvatar.textContent = initial;
            }
        });

        // ── Sync mobile history from desktop ─────────────────
        function syncMobileHistory() {
            var mobileList  = document.getElementById("mobile-history-list");
            var desktopList = document.getElementById("history-list");
            if (mobileList && desktopList) {
                mobileList.innerHTML = desktopList.innerHTML;
                mobileList.querySelectorAll(".history-item").forEach(function(item) {
                    item.addEventListener("click", closeDrawer);
                });
            }
        }
        var desktopList = document.getElementById("history-list");
        if (desktopList) {
            new MutationObserver(syncMobileHistory).observe(desktopList, { childList: true, subtree: true });
        }

    })();
    </script>
