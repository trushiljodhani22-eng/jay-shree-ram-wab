<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiritual AI Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali&family=Noto+Sans+Devanagari&family=Noto+Sans+Gurmukhi&family=Noto+Sans+Kannada&family=Noto+Sans+Malayalam&family=Noto+Sans+Oriya&family=Noto+Sans+Tamil&family=Noto+Sans+Telugu&family=Noto+Sans+Arabic&family=Noto+Sans+Ol+Chiki&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="login-screen" class="login-screen">
        <div class="login-wrapper">
            <div class="login-logo-box">
                <img src="logo.png" alt="Logo" class="login-logo">
            </div>
            <h1 class="login-title">JAY SHREE RAM</h1>
            <div class="login-buttons">
                <button id="google-login-btn" class="login-btn google-btn">
                    <span class="icon google-icon">G</span>
                    <span>Continue with Google</span>
                </button>
                <p class="or-text">OR</p>
                <button id="facebook-login-btn" class="login-btn facebook-btn">
                    <span class="icon facebook-icon">f</span>
                    <span>Continue with Facebook</span>
                </button>
            </div>
            <p id="login-error" class="login-error"></p>
        </div>
    </div>

    <aside id="sidebar" class="sidebar">
        <button id="sidebar-toggle" class="sidebar-btn" type="button" title="Open Slider">
            <span class="sidebar-icon">☰</span>
            <span class="sidebar-label">Open Slider</span>
        </button>
        <button id="new-chat-btn" class="sidebar-btn" type="button" title="New Chat">
            <span class="sidebar-icon">＋</span>
            <span class="sidebar-label">New Chat</span>
        </button>
        <button id="search-chat-btn" class="sidebar-btn" type="button" title="Search Chats">
            <span class="sidebar-icon">🔍</span>
            <span class="sidebar-label">Search Chats</span>
        </button>
        <button id="books-btn" class="sidebar-btn" type="button" title="Books">
            <span class="sidebar-icon">📚</span>
            <span class="sidebar-label">Books</span>
        </button>
        <div id="sidebar-history" class="sidebar-history">
            <div class="history-item">
                <span class="history-title">Recent Chat</span>
                <button class="history-menu-btn" type="button" title="Chat options">⋮</button>
                <div class="history-action-menu">
                    <button type="button">🔗 Share</button>
                    <button type="button">✏️ Rename</button>
                    <button type="button">🗑️ Delete</button>
                </div>
            </div>
        </div>
        <div class="sidebar-user">
          <button id="user-menu-btn" class="user-menu-btn" type="button" aria-label="Open user menu">
            <span id="sidebar-user-initial">U</span>
            <span id="sidebar-user-name" class="sidebar-label">User</span>
          </button>
          <div id="user-menu-panel" class="user-menu-panel">
            <p id="sidebar-user-email" class="sidebar-user-email">user@email.com</p>
            <button id="upgrade-plan-btn" class="user-menu-option" type="button">
              <span>⭐</span>
              <span>Upgrade Plan</span>
            </button>
            <button id="profile-btn" class="user-menu-option" type="button">
              <span>👤</span>
              <span>Profile</span>
            </button>
            <button id="logout-btn" class="user-menu-option logout-option" type="button">
              <span>🚪</span>
              <span>Logout</span>
            </button>
          </div>
        </div>
    </aside>

    <div id="main-content" class="auth-hidden">
        <header>
            <div class="header-left">
                <div class="logo-box">
                    <img src="logo.png" alt="Logo" class="main-logo">
                </div>
            </div>
            <div class="center-title">
                <h2>JAY SHREE RAM</h2>
            </div>
            <div class="header-right">
                <div class="header-right-column">
                    <img src="hanuman_ram_sita_pranam.jpg" alt="Hanuman Ram Sita Pranam" class="header-img"
                        data-i18n-alt="headerImageAlt">
                    <select id="language-select" class="lang-dropdown" data-i18n-aria="selectLanguageAria"
                        aria-label="Select language">
                        <option value="en" selected>English</option>
                        <option value="hi">हिन्दी (Hindi)</option>
                        <option value="gu">ગુજરાતી (Gujarati)</option>
                        <option value="mr">मराठी (Marathi)</option>
                        <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
                        <option value="bn">বাংলা (Bengali)</option>
                        <option value="ta">தமிழ் (Tamil)</option>
                        <option value="te">తెలుగు (Telugu)</option>
                        <option value="kn">ಕನ್ನಡ (Kannada)</option>
                        <option value="ml">മലയാളം (Malayalam)</option>
                        <option value="or">ଓଡ଼ିଆ (Odia)</option>
                        <option value="as">অসমীয়া (Assamese)</option>
                        <option value="ur">اردو (Urdu)</option>
                        <option value="sa">संस्कृतम् (Sanskrit)</option>
                        <option value="gom">कोंकणी (Konkani)</option>
                        <option value="ks">कॉशुर (Kashmiri)</option>
                        <option value="mni">মৈতৈলোন্ (Manipuri)</option>
                        <option value="ne">नेपाली (Nepali)</option>
                        <option value="sd">سنڌي (Sindhi)</option>
                        <option value="doi">डोगरी (Dogri)</option>
                        <option value="mai">मैथिली (Maithili)</option>
                        <option value="brx">बड़ो (Bodo)</option>
                        <option value="sat">ᱥᱟᱱᱛᱟᱲᱤ (Santali)</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="chat-container">
            <div class="chat-box" id="chat-box">
                <div class="message ai-message">
                    <p id="welcome-msg" lang="en" dir="ltr" translate="no" data-i18n="welcome" data-i18n-vars="name"></p>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" data-i18n-placeholder="inputPlaceholder"
                    placeholder="Type your question here...">
                <div class="buttons-grid">
                    <button id="mic-btn" class="action-btn" data-i18n="micModeOff">🎤 Mode: Off</button>
                    <button id="speak-btn" class="action-btn" data-i18n="listen">🔊 Listen</button>
                    <button id="send-story-btn" class="action-btn story-btn" data-i18n="storyBtn">Story 📜</button>
                    <button id="send-suggestion-btn" class="action-btn suggestion-btn" data-i18n="suggestionBtn">Suggestion 💡</button>
                </div>
            </div>
        </main>
    </div>
    <!-- =========================================
         PROFILE MODAL
    ========================================= -->
    <div id="profile-modal" class="profile-modal">
      <div class="profile-modal-content">
        <button id="close-profile-modal" class="close-profile-modal">
          ✕
        </button>
        <div class="profile-avatar-wrapper">
          <div id="profile-avatar" class="profile-avatar">
            U
          </div>
          <label for="profile-image-input" class="profile-camera-btn">
            📷
          </label>
          <input
            type="file"
            id="profile-image-input"
            accept="image/*"
            hidden
          >
        </div>
        <p id="profile-email" class="profile-email">
          user@email.com
        </p>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="auth.js"></script>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
</body>

</html>
