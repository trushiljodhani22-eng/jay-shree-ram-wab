<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiritual AI Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali&family=Noto+Sans+Devanagari&family=Noto+Sans+Gurmukhi&family=Noto+Sans+Kannada&family=Noto+Sans+Malayalam&family=Noto+Sans+Oriya&family=Noto+Sans+Tamil&family=Noto+Sans+Telugu&family=Noto+Sans+Arabic&family=Noto+Sans+Ol+Chiki&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="main-content">
        <header>
            <div class="header-left">
                <div class="logo-box">
                    <img src="logo.png" alt="Logo" class="main-logo">
                </div>
            </div>
            <div class="center-title">
                <h2>JAY SHREE RAM</h2>
            </div>
            <div class="header-right">
                <div class="header-right-column">
                    <img src="hanuman_ram_sita_pranam.jpg" alt="Hanuman Ram Sita Pranam" class="header-img"
                        data-i18n-alt="headerImageAlt">
                    <select id="language-select" class="lang-dropdown" data-i18n-aria="selectLanguageAria"
                        aria-label="Select language">
                        <option value="en" selected>English</option>
                        <option value="hi">हिन्दी (Hindi)</option>
                        <option value="gu">ગુજરાતી (Gujarati)</option>
                        <option value="mr">मराठी (Marathi)</option>
                        <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
                        <option value="bn">বাংলা (Bengali)</option>
                        <option value="ta">தமிழ் (Tamil)</option>
                        <option value="te">తెలుగు (Telugu)</option>
                        <option value="kn">ಕನ್ನಡ (Kannada)</option>
                        <option value="ml">മലയാളം (Malayalam)</option>
                        <option value="or">ଓଡ଼ିଆ (Odia)</option>
                        <option value="as">অসমীয়া (Assamese)</option>
                        <option value="ur">اردو (Urdu)</option>
                        <option value="sa">संस्कृतम् (Sanskrit)</option>
                        <option value="gom">कोंकणी (Konkani)</option>
                        <option value="ks">कॉशुर (Kashmiri)</option>
                        <option value="mni">মৈতৈলোন্ (Manipuri)</option>
                        <option value="ne">नेपाली (Nepali)</option>
                        <option value="sd">سنڌي (Sindhi)</option>
                        <option value="doi">डोगरी (Dogri)</option>
                        <option value="mai">मैथिली (Maithili)</option>
                        <option value="brx">बड़ो (Bodo)</option>
                        <option value="sat">ᱥᱟᱱᱛᱟᱲᱤ (Santali)</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="chat-container">
            <div class="chat-box" id="chat-box">
                <div class="message ai-message">
                    <p id="welcome-msg" lang="en" dir="ltr" translate="no" data-i18n="welcome" data-i18n-vars="name"></p>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" data-i18n-placeholder="inputPlaceholder"
                    placeholder="Type your question here...">
                <div class="buttons-grid">
                    <button id="mic-btn" class="action-btn" data-i18n="micModeOff">🎤 Mode: Off</button>
                    <button id="speak-btn" class="action-btn" data-i18n="listen">🔊 Listen</button>
                    <button id="send-story-btn" class="action-btn story-btn" data-i18n="storyBtn">Story 📜</button>
                    <button id="send-suggestion-btn" class="action-btn suggestion-btn" data-i18n="suggestionBtn">Suggestion 💡</button>
                </div>
            </div>
        </main>
    </div>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
</body>

</html>
